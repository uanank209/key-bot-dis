<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận Key - Anime Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Ảnh nền Anime (Bạn có thể thay đổi link ảnh theo ý thích) */
            background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover;
            position: relative;
            overflow: hidden;
        }

        /* Lớp phủ làm tối nền để làm nổi bật bảng key */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px); /* Hiệu ứng làm mờ nền */
            z-index: 1;
        }

        /* Hộp chứa hiệu ứng Glassmorphism */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: #fff;
            max-width: 450px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 15px;
            margin-bottom: 30px;
            opacity: 0.9;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        /* Nút chứa Key */
        .key-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 18px 20px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
            word-break: break-all; /* Tránh key quá dài bị tràn */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .key-box:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.6);
        }

        .key-box:active {
            transform: translateY(1px);
        }

        /* Hiệu ứng tia sáng chạy ngang khi hover */
        .key-box::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: all 0.5s ease;
        }

        .key-box:hover::after {
            left: 150%;
        }

        .copy-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        /* Thông báo sau khi Copy */
        #toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #333;
            padding: 12px 25px;
            border-radius: 50px;
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 15px;
        }

        .show-toast {
            bottom: 30px !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">Hệ Thống Key</div>
        <div class="subtitle">Bấm vào box bên dưới để copy key nhé (´｡• ᵕ •｡`)</div>
        
        <div class="key-box" id="keyBox" onclick="copyKey()">
            <span id="keyValue">Đang kiểm tra dữ liệu...</span>
            <span class="copy-icon" id="copyIcon">📋</span>
        </div>
    </div>

    <div id="toast">Đã copy thành công! ✨</div>

    <script>
        // Bắt tham số 'key' trên thanh địa chỉ URL
        const urlParams = new URLSearchParams(window.location.search);
        const myKey = urlParams.get('key');
        
        const keyValueElement = document.getElementById('keyValue');
        const keyBox = document.getElementById('keyBox');
        const copyIcon = document.getElementById('copyIcon');

        // Logic xử lý khi có hoặc không có key trên URL
        if (myKey) {
            keyValueElement.innerText = myKey;
        } else {
            keyValueElement.innerText = "Không tìm thấy Key!";
            copyIcon.style.display = "none";
            keyBox.style.cursor = "not-allowed";
            keyBox.onclick = null; // Tắt tính năng click nếu không có key
        }

        // Hàm xử lý Copy tự động
        function copyKey() {
            if (!myKey) return;

            // Lệnh copy vào Clipboard
            navigator.clipboard.writeText(myKey).then(() => {
                const toast = document.getElementById('toast');
                
                // Hiện thông báo
                toast.classList.add('show-toast');
                
                // Hiệu ứng đổi text tạm thời trong box
                const originalText = keyValueElement.innerText;
                keyValueElement.innerText = "(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧ Copied!";
                copyIcon.style.display = "none";
                
                // Tự động ẩn thông báo sau 2.5 giây
                setTimeout(() => {
                    toast.classList.remove('show-toast');
                    keyValueElement.innerText = originalText;
                    copyIcon.style.display = "inline";
                }, 2500);

            }).catch(err => {
                console.error('Lỗi sao chép: ', err);
                alert("Trình duyệt không hỗ trợ copy tự động, vui lòng bôi đen và copy thủ công!");
            });
        }
    </script>
</body>
</html>
